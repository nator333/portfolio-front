version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    # The Angular release train is version-locked: every @angular/* package
    # must move together, and majors need `ng update` to run the migration
    # schematics. A bare version bump breaks `npm ci` on peer resolution, so
    # majors are handled manually instead. zone.js is pinned by @angular/core's
    # peer range and is ignored outright (it is 0.x, so minors are breaking).
    ignore:
      - dependency-name: "@angular/*"
        update-types:
          - version-update:semver-major
      - dependency-name: "@angular-devkit/*"
        update-types:
          - version-update:semver-major
      - dependency-name: "zone.js"
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
          - "@schematics/*"
          - "ng-packagr"
          - "zone.js"
      karma:
        patterns:
          - "karma*"
          - "jasmine*"
          - "@types/jasmine"
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions:
        patterns:
          - "*"
